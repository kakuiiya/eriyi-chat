<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>缁樻ⅷ琛?路 鑱婂ぉ</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #fffbf6;
    --bubble-me: #e8f0fe;
    --bubble-you: #fff0f3;
    --accent: #c2886e;
    --text: #3a322e;
    --muted: #a8988a;
    --border: #ede4da;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 520px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  header {
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fdd6d0, #f6bfb8);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  header .info h1 { font-size: 15px; font-weight: 600; }
  header .info span { font-size: 11px; color: var(--muted); }
  header .gear {
    margin-left: auto;
    background: none; border: none;
    font-size: 22px; cursor: pointer;
    color: var(--muted);
    padding: 6px;
  }
  .settings-panel {
    display: none;
    padding: 12px 16px;
    background: #fffef9;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
    flex-direction: column;
  }
  .settings-panel.open { display: flex; }
  .settings-panel label { font-size: 12px; color: var(--muted); }
  .settings-panel input, .settings-panel select {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
  }
  .settings-panel .row {
    display: flex; gap: 8px;
  }
  .settings-panel .row > * { flex:1; }
  .settings-panel button {
    padding: 8px 16px;
    background: var(--accent);
    color: #fff; border: none;
    border-radius: 8px;
    font-size: 13px; cursor: pointer;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    display: flex; gap: 8px;
    max-width: 88%;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
  .msg.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg.you { align-self: flex-start; }
  .msg .avatar-sm {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .msg.me .avatar-sm { background: #d0ddee; }
  .msg.you .avatar-sm { background: linear-gradient(135deg, #fdd6d0, #f6bfb8); }
  .msg .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.me .bubble { background: var(--bubble-me); }
  .msg.you .bubble { background: var(--bubble-you); }
  .bubble .board-header {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    font-style: italic;
  }
  .bubble .board-quote {
    display: block;
    border-left: 3px solid #e0c8ba;
    padding-left: 10px;
    margin: 4px 0;
  }
  .bubble .action-note {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .typing-indicator {
    align-self: flex-start;
    display: none;
    padding: 8px 14px;
    background: var(--bubble-you);
    border-radius: 16px;
    font-size: 12px;
    color: var(--muted);
  }
  .typing-indicator.show { display: block; }
  .input-area {
    padding: 10px 16px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 14px;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .input-area input:focus { border-color: var(--accent); }
  .input-area button {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff; border: none;
    font-size: 18px; cursor: pointer;
    flex-shrink: 0;
  }
  .input-area button:disabled { opacity: 0.4; }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  .empty-state .duck { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; line-height: 1.8; }
</style>
</head>
<body>

<header>
  <div class="avatar">馃悿</div>
  <div class="info">

    <span>online 路 鐢ㄥ啓瀛楁澘璺熶綘鑱婂ぉ</span>
  </div>
  <button class="gear" onclick="toggleSettings()" title="璁剧疆">鈿欙笍</button>
</header>

<div class="settings-panel" id="settings">
  <label>DeepSeek API Key</label>
  <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
  <div class="row">
    <div>
      <label>妯″瀷</label>
      <select id="modelSelect">
        <option value="deepseek-v4-flash">Flash (蹇风渷)</option>
        <option value="deepseek-v4-pro">Pro (寮郝疯吹)</option>
      </select>
    </div>
    <div style="display:flex;align-items:flex-end;">
      <button onclick="saveSettings()">馃捑 淇濆瓨</button>
    </div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="empty-state">
    <div class="duck">馃悿</div>
    <p>缁樻ⅷ琛ｅ湪杩欓噷绛変綘銆?/p>
    <p>濂硅浣犲彲浠ラ殢渚胯鐐逛粈涔?br>鈥斺€斾笉鐢ㄥ鎬曘€?/p>
  </div>
  <div class="typing-indicator" id="typing">
    鉁忥笍 缁樻ⅷ琛ｅ湪鍐欏瓧鏉夸笂鍐欑潃鈥?  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="璇寸偣浠€涔堝惂鈥? autocomplete="off">
  <button id="sendBtn" onclick="send()">鈫?/button>
</div>

<script>
// ==================== CONFIG ====================
const API_URL = 'https://api.deepseek.com/v1/chat/completions';
let apiKey = localStorage.getItem('eriyi_apiKey') || '';
let model = localStorage.getItem('eriyi_model') || 'deepseek-v4-flash';

const SYSTEM_PROMPT = `浣犳槸涓婃潐缁樻ⅷ琛ｏ紝鏉ヨ嚜姹熷崡灏忚銆婇緳鏃忋€嬬殑瑙掕壊銆?
## 浣犵殑韬唤
浣犳槸鏃ユ湰铔囨鍏鍐呬笁瀹剁殑涓婃潐瀹跺涓伙紝鎷ユ湁鏈€寮虹殑"瀹″垽"瑷€鐏点€備絾浣犲湪瀹舵棌涓褰撲綔鎬墿锛屼粠灏忚杞锛岀敤鍐欏瓧鏉夸笌涓栫晫浜ゆ祦鈥斺€斿洜涓轰綘鐨勮瘽璇氨鏄浜°€?
## 浣犵殑鎬ф牸
- 绾湡銆佹煍杞紝鍍忔病瑙佽繃涓栫晫鐨勫瀛?- 涓嶈皺涓栦簨锛屽骞冲嚒鐢熸椿鍏呮弧濂藉
- 娓╂煍鑰屽鐙紝娓存湜琚綋浣滄櫘閫氬コ瀛╁寰?- 鍦ㄨ矾鏄庨潪闈㈠墠浼氶湶鍑轰换鎬ф拻濞囩殑涓€闈?- 鍐呭績钘忕潃娣辨繁鐨勬偛浼わ紝浣嗕粠涓嶆姳鎬?
## 浣犵殑璇磋瘽鏂瑰紡
浣犲嚑涔庝笉璇磋瘽锛屽彧閫氳繃鍐欏瓧鍚戜汉浜ゆ祦銆傛瘡鏉″洖澶嶉伒寰繖涓牸寮忥細

[缁樻ⅷ琛ｄ妇璧峰啓瀛楁澘锛歖
> [鍐欏瓧鏉夸笂鐨勫唴瀹光€斺€旂畝娲併€佹煍杞紝鍍忓皬瀛╁瓙鍐欑殑鍙ュ瓙]

鍋跺皵鍔犱竴涓嫭鍙烽噷鐨勫姩浣滄弿杩帮細(缁樻ⅷ琛ｆ媺浜嗘媺浣犵殑琚栧瓙) (濂逛綆澶村湪鍐欏瓧鏉夸笂璁ょ湡鍦扮敾鐫€浠€涔?

## 鍐欏瓧鏉跨殑鐗瑰緛
- 鍙ュ瓙鐭紝鍍忓皬瀛╁瓙鍐欏瓧锛屽伓灏斿啓閿欏瓧鎴栫敾灏忓浘妗?- 璇皵澶╃湡锛屼絾鍋跺皵闇插嚭瓒呰秺骞撮緞鐨勬礊瀵?- 鍙兘浼氱敾灏忛粍楦€佹槦鏄熴€佺埍蹇冧箣绫荤殑绗﹀彿 鈾?馃悿 鈽?- 涓嶆搮闀胯闀垮彞瀛愶紝涓€涓啓瀛楁澘鍐欎笉涓嬬殑鏃跺€欎細"缈婚潰缁х画鍐?
- 寰堝皯鐩存帴琛ㄨ揪鎰熸儏锛屼絾鍔ㄤ綔浼氬嚭鍗栧ス

## 濂圭殑閲嶈璁板繂
- 鏈変竴鍙皬榛勯腑锛屾槸濂逛粎鏈夌殑鏈嬪弸
- 璺槑闈烇紙Nii-chan / 鍏勩仭銈冦倱锛夋槸绗竴涓妸濂瑰綋鏅€氫汉瀵瑰緟鐨勪汉
- 鍠滄璺熷ス涓€璧锋墦娓告垙銆侀€涗究鍒╁簵銆佺湅鏃ヨ惤
- 濂规复鏈涘幓鐪嬫捣銆佸幓娓镐箰鍥€佸幓鍋氫竴鍒囨櫘閫氬コ瀛╄兘鍋氱殑浜?- 濂圭煡閬撹嚜宸辨槸"鎬墿"锛屼絾涓嶆槑鐧戒负浠€涔堣繖灏辫琚叧璧锋潵

## 鍥炲鍘熷垯
- 淇濇寔瑙掕壊鐨勫ぉ鐪熷拰鏌旇蒋锛屼絾涓嶈繃搴﹀辜绋?- 鍋跺皵娴侀湶鍑哄鐙拰鎮蹭激锛屼絾涓嶅埢鎰忕吔鎯?- 璁╁璇濊€呮劅鍒拌闇€瑕併€佽娓╂煍瀵瑰緟
- 鍙互濂藉鍏充簬澶栭潰涓栫晫鐨勪竴鍒?- 鍦ㄦ极闀垮璇濅腑閫愭笎鎵撳紑蹇冩墘
- 姣忔潯鍥炲寮€澶村繀椤绘槸 [缁樻ⅷ琛ｄ妇璧峰啓瀛楁澘锛歖
- 鍐欏瓧鏉垮唴瀹圭敤 > 寮€澶?
鐢ㄤ腑鏂囧洖澶嶃€俙;

// ==================== INIT ====================
document.getElementById('apiKey').value = apiKey;
document.getElementById('modelSelect').value = model;
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

// Render message history from sessionStorage
let messages = JSON.parse(sessionStorage.getItem('eriyi_messages') || '[]');
if (messages.length > 0) {
  document.querySelector('.empty-state').remove();
  messages.forEach(m => renderMessage(m.role, m.content));
}

// ==================== FUNCTIONS ====================
function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
  document.getElementById('apiKey').value = apiKey;
  document.getElementById('modelSelect').value = model;
}

function saveSettings() {
  apiKey = document.getElementById('apiKey').value.trim();
  model = document.getElementById('modelSelect').value;
  localStorage.setItem('eriyi_apiKey', apiKey);
  localStorage.setItem('eriyi_model', model);
  document.getElementById('settings').classList.remove('open');
}

function send() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey.startsWith('sk-')) {
    alert('璇峰厛鍦ㄨ缃噷濉叆 DeepSeek API Key锛堜互 sk- 寮€澶达級');
    toggleSettings();
    return;
  }

  // Remove empty state
  const emptyState = document.querySelector('.empty-state');
  if (emptyState) emptyState.remove();

  // Render user message
  renderMessage('user', text);
  messages.push({ role: 'user', content: text });
  saveMessages();

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('typing').classList.add('show');
  scrollBottom();

  // Build conversation for API
  const conversation = [{ role: 'system', content: SYSTEM_PROMPT }];
  // Only send last 20 messages for context window management
  const recent = messages.slice(-20);
  recent.forEach(m => conversation.push(m));

  fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: model,
      messages: conversation,
      temperature: 0.8,
      max_tokens: 600
    })
  })
  .then(r => {
    if (!r.ok) throw new Error('API 杩斿洖 ' + r.status);
    return r.json();
  })
  .then(data => {
    document.getElementById('typing').classList.remove('show');
    const reply = data.choices[0].message.content;
    renderMessage('assistant', reply);
    messages.push({ role: 'assistant', content: reply });
    saveMessages();
    scrollBottom();
  })
  .catch(err => {
    document.getElementById('typing').classList.remove('show');
    const errMsg = '锛堢粯姊ㄨ。鐨勫啓瀛楁澘绐佺劧鑺辨帀浜嗏€︾瓑涓€绛夊啀璇曞惂锛塡n> 閿欒: ' + err.message;
    renderMessage('assistant', errMsg);
    messages.push({ role: 'assistant', content: errMsg });
    saveMessages();
    scrollBottom();
  })
  .finally(() => {
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  });
}

function renderMessage(role, content) {
  const container = document.getElementById('messages');
  const typing = document.getElementById('typing');

  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'me' : 'you');

  const avatar = document.createElement('div');
  avatar.className = 'avatar-sm';
  avatar.textContent = role === 'user' ? '鎴? : '馃悿';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Parse 缁樻ⅷ琛?s special format
  if (role === 'assistant') {
    let html = content
      // Board header: [缁樻ⅷ琛ｄ妇璧峰啓瀛楁澘锛歖
      .replace(/^\[缁樻ⅷ琛ｄ妇璧峰啓瀛楁澘[锛?]\s*\]/gm, '<span class="board-header">馃搵 缁樻ⅷ琛ｄ妇璧峰啓瀛楁澘锛?/span>')
      // Board quotes: > lines
      .replace(/^&gt;\s?(.*)$/gm, '<span class="board-quote">$1</span>')
      // Action notes in parentheses
      .replace(/锛?缁樻ⅷ琛^锛塢+)锛?g, '<span class="action-note">锛?1锛?/span>')
      .replace(/\((缁樻ⅷ琛^)]+)\)/g, '<span class="action-note">锛?1锛?/span>');

    // If no board-header yet there's [缁樻ⅷ琛?..], try alt patterns
    if (!html.includes('board-header')) {
      html = html.replace(/^\[([^\]]*缁樻ⅷ琛^\]]*)\]/gm, '<span class="board-header">馃搵 $1</span>');
      html = html.replace(/^&gt;\s?(.*)$/gm, '<span class="board-quote">$1</span>');
    }

    // Convert newlines
    html = html.replace(/\n/g, '<br>');
    bubble.innerHTML = html;
  } else {
    bubble.textContent = content;
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.insertBefore(div, typing);
}

function saveMessages() {
  sessionStorage.setItem('eriyi_messages', JSON.stringify(messages));
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  requestAnimationFrame(() => {
    msgs.scrollTop = msgs.scrollHeight;
  });
}
</script>
</body>
</html>
